<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
  *{margin:0px;padding:0px;line-height: 1.5;}

  .register_form .container {
    background: #fff;
    max-width: 470px;
    width: 90%;
    padding: 30px 30px;
    border-radius: 10px;
}

.register_form {
    background: darkslategray;
    padding: 80px 20px ;
    /* height: 100vh; */
    display: flex;
    align-items: center;
    justify-content: center;
}

.formTitle {
    font-weight: 700;
    font-size: 30px;
    text-align: center;
    margin-bottom: 10px;
}

.formdisc {
    font-size: 16px;text-align: center;
}

.field input {
    width: 100%;
}

.field {
    background: #2f4f4f14;
    margin-bottom: 15px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 7px;
    height: 100%;
    overflow: hidden;
    max-height: 50px;transition: 1s;
}

.field input:focus,.field input {
    border: 0;
    background: transparent;
    font-size: 16px;
}

.field i {
    background: #000;
    color: #fff;
    padding: 10px;
}

.textInfo {
    font-size: 16px;
    text-transform: capitalize;
}

.textInfo a {
    font-weight: bold;
    color: #2f4f4f;
    text-decoration: underline;
}

.form-actions {
    margin: 20px 0;
    display: flex;
    gap: 20px;
}

.form-actions button {
    background: #2f4f4f;
    color: #fff;
    border: 0;
    padding: 10px;
    font-size: 16px;
    display: block;
    width: 100%;
    border-radius: 6px;
}

.form-actions button.disabled {
    opacity: 0.3;
}

.form_field input:focus-visible, .form_field input:focus {
    border: 0;
    outline: 0px;
    box-shadow: 0 0 0;
}

.form_field input {
    color: #857975;
}
.heading-block {
    text-align: center;
    margin: 20px auto;text-transform: uppercase;
}
.modalInfo .modal {
    background: rgb(0 0 0 / 70%);
}
.modalInfo  #openModel {
    background: linear-gradient(45deg, black, transparent);
    color: #fff;
    font-size: 20px;
    padding: 10px 30px;
    border-radius: 33px;
    border: 0;
    transition: 0.5s;
}

.modalInfo  #openModel:hover {
    background: #000;
}

.modalInfo .modal-content {
    max-width: 670px;
    margin: auto;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    position: absolute;
    width: 100%;
    padding: 30px;
}

.modalInfo #closeModel {
    width: 40px;
    height: 40px;
    border-radius: 100px;
    border: 0px;
    background: #000;
    color: #fff;
    line-height: 0;
    font-size: 22px;
    position: absolute;
    right: 15px;
    top: 15px;
}

section.students-marks {
    padding: 80px 20px;
    background: lightblue;
    margin-top: 80px;
}
.students-marks table, .students-marks th, .students-marks td {
    border: 1px solid green;
    padding: 10px 20px;
    box-sizing: border-box;
    border-collapse: collapse;
    text-align: center;
    font-weight: 400;
}

.students-marks input[type="number"] {
    width: 40px;
    height: 40px;
    text-align: center;
    border: 1px solid;
    background: transparent;
    border-radius: 6px;
}

.students-marks th {
    text-transform: uppercase;
    font-weight: 600;
    font-size: 18px;
}

.students-marks table {
    width: 100%;
}

.students-marks button {
    width: 100%;
    background: #000;
    color: #fff;
    padding: 12px 20px;
    font-size: 16px;
    text-transform: uppercase;
    border: 0;
    border-radius: 6px;
}

.students-marks #result {
    font-size: 18px;
    margin: 10px 0 0;
}

  </style>
<body>

<section class="register_form">  
<div class="container">

  <div class="form_field">

</div> 
</section>

<script>

function login(){

let username = document.getElementById("username").value;
let userpassword = document.getElementById("password").value;

if(username !== '' && userpassword !== ''){
    
    document.getElementById("studentMarks").style.display = "block";


}else{

</script>

function checkMax(el){
    if(el.value > 100){
        el.value = el.value.slice(0, -1);
    }
}


function sumMarks() {

let hindiMarks = Number(document.querySelector(".hindi input").value);
let englishMarks = Number(document.querySelector(".english input").value);
let mathMarks = Number(document.querySelector(".math input").value);
let scienceMarks = Number(document.querySelector(".science input").value);

let sum = hindiMarks + englishMarks + mathMarks + scienceMarks;
let percentage = (sum / 400) * 100;
document.getElementById("result").innerHTML = "Total Marks : " + sum + "<br/>" + "Total Percentage : " + percentage +"%";

}



</script>

<script>
function openModel(){
  document.getElementById("modal").style.display="block";
  document.body.style.overflow="hidden";
}

function closeModel(){
  document.getElementById("modal").style.display="none";
  document.body.style.overflow="auto";
}

function checkMax(input) {

  if (input.value > 100) {
      input.value = 100;
  }

  let marks = Number(input.value);
  let grade = '';

  if (marks >= 90) {
      grade = "A";
  } else if (marks >= 70) {
      grade = "B";
  } else if (marks >= 60) {
      grade = "C";
  } else if (marks >= 40) {
      grade = "D";
  } else {
      grade = "Fail";
  }

  // find the current row
  let row = input.closest("tr");

  // find grade column
  let gradeCell = row.querySelector(".gradeInput");

  // insert grade
  gradeCell.textContent = grade;
}

let formTitle = document.querySelector(".formTitle");
let fname = document.querySelector(".fname");
let Username = document.querySelector(".username");
let password = document.querySelector(".password");
let email = document.querySelector(".email");
let textInfo = document.querySelector(".textInfo");
let signInbtn = document.querySelector(".signInbtn");
let signUpbtn = document.querySelector(".signUpbtn");
let formdisc = document.querySelector(".formdisc");

signInbtn.addEventListener('click', () => {
formTitle.innerHTML="Sign In";
formdisc.innerHTML="Definition and Usage";
signInbtn.classList.remove("disabled");
signUpbtn.classList.add("disabled");
fname.style.maxHeight="0px";fname.style.marginBottom="0px";
email.style.maxHeight="0px";email.style.marginBottom="0px";
});

signUpbtn.addEventListener('click', () => {
formTitle.innerHTML="Sign Up";
formdisc.innerHTML="See real cleaners at work — from scrubbing kitchens";
fname.style.maxHeight="50px";fname.style.marginBottom="15px";
email.style.maxHeight="50px";email.style.marginBottom="15px";
signInbtn.classList.add("disabled");
signUpbtn.classList.remove("disabled");
});

</script>
