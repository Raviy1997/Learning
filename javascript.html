<div class="scoreList"></div>

<script>
let scoreList = [
  { name: "Ravi", score: 87, subject: "baseball" },
  { name: "Ravi", score: 87, subject: "baseball" },
  { name: "Ravi", score: 87, subject: "baseball" },
  { name: "Ravi", score: 87, subject: "baseball" }
];

let newScore = document.getElementsByClassName("scoreList")[0];

scoreList.forEach(item => {
  let li = document.createElement('li');

  li.innerHTML = ` Name: ${item.name} <br>   Score: ${item.score} <br>  Subject: ${item.subject} `;

  newScore.appendChild(li);
});
</script>
