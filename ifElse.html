<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Ternary Operator</h1>
<p id="demo"></p>

<input type="number" id="score" placeholder="Enter score">
<button onclick="checkGrade()">Check Grade</button>

<button onclick="marksFunction()">Check Grade</button>

<p id="result"></p>

<p id="marksResult"></p>


<script>
function checkGrade(){
let score= document.getElementById("score").value;
let grade ;
if (score > 90){
grade="Grade A"
}
else if (score > 80){
grade="Grade B"
}
else if (score > 70){
grade="Grade C"
}

else if (score > 60){
grade="Grade D"
}

else {
    grade="Fail F"
}
document.getElementById("result").innerText=`score :${score}, grade: ${grade} ` ;

}
</script>  


<script>
let marks = document.getElementById("score").value;

 let  scoreMarks = marks > 90 ? "grade A" : marks > 80 ? "grade B" : marks > 70 ? "grade C": marks > 60 ? "grade D" : "fail";

document.getElementById("marksResult").innerText=`marks grade ${scoreMarks}`;
}

</script>

<form onsubmit="return false;">

  <input type="number" id="m_result" />

</div>

</form>

<script>
    function studentFunction(){
    let sbj1 = Number(document.getElementById("sbj1").value);
    let sbj2 = Number(document.getElementById("sbj2").value);
    let sbj3 = Number(document.getElementById("sbj3").value);
    let sbj4 = Number(document.getElementById("sbj4").value);

    let total_Marks =sbj1 + sbj2 + sbj3 + sbj4 ;
    let totalPercent=(total_Marks / 400) * 100 ;

    let m_result = Number(document.getElementById("m_result").value);
    console.log(`${m_result}`);

    switch(m_result) {
    case 1:
  document.getElementById("marks_Result").innerText =
    `Total Marks = ${total_Marks}`;
        break;

    case 2:
        document.getElementById("marksPercentage").innerText =
            `Percentage: ${totalPercent}`;
        break;

    default:
        document.getElementById("marks_Result").innerText =
            "Enter 1 for Marks or 2 for Percentage";
}
}

 </script>
